<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemma & Alex Vietnam Trip</title>
    <style>
      :root {
        --bg: #151216;
        --bg-soft: #1b161c;
        --card: rgba(33, 24, 31, 0.9);
        --card-2: rgba(43, 31, 39, 0.9);
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.12);
        --text: #f8f4f6;
        --muted: #d2c7cd;
        --muted-2: #aa9ea5;
        --accent: #efb3c0;
        --accent-2: #d86a86;
        --accent-dark: #7c2235;
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
        --shadow-soft: 0 10px 25px rgba(0, 0, 0, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(216, 106, 134, 0.12), transparent 28%),
          radial-gradient(circle at top left, rgba(239, 179, 192, 0.08), transparent 24%),
          linear-gradient(180deg, #171217 0%, #110f12 100%);
        color: var(--text);
      }

      body.overlay-open {
        overflow: hidden;
      }

      a {
        color: white;
      }

      button {
        font: inherit;
      }

      .page {
        height: 100dvh;
        overflow: hidden;
        padding: 14px 12px 16px;
      }

      .container {
        max-width: 760px;
        height: 100%;
        margin: 0 auto;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 12px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        padding: 18px 18px 16px;
        border: 1px solid var(--border);
        border-radius: 26px;
        background:
          linear-gradient(135deg, rgba(216, 106, 134, 0.08), rgba(255,255,255,0.02)),
          rgba(27, 22, 28, 0.82);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -50px -50px auto;
        width: 150px;
        height: 150px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(239, 179, 192, 0.12), transparent 70%);
        pointer-events: none;
      }

      .title {
        font-size: 32px;
        line-height: 0.98;
        margin: 0 0 8px;
        letter-spacing: -0.03em;
      }

      .subtitle {
        color: var(--muted);
        margin: 0;
        font-size: 14px;
        max-width: 560px;
        line-height: 1.45;
      }

      .top-summary {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .pill {
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.04);
        border-radius: 999px;
        padding: 7px 11px;
        font-size: 12px;
        color: var(--muted);
        box-shadow: var(--shadow-soft);
      }

      .roadmap {
        position: relative;
        min-height: 0;
        display: grid;
        grid-template-rows: repeat(var(--day-count), minmax(0, 1fr));
        gap: 7px;
        padding: 6px 0;
      }

      .roadmap::before {
        content: "";
        position: absolute;
        top: 10px;
        bottom: 10px;
        left: 9px;
        width: 2px;
        border-radius: 999px;
        background: linear-gradient(
          180deg,
          rgba(239, 179, 192, 0.7),
          rgba(216, 106, 134, 0.24)
        );
        pointer-events: none;
      }

      .roadmap-item {
        position: relative;
        z-index: 1;
        width: 100%;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.035);
        border-radius: 18px;
        color: inherit;
        text-align: left;
        display: grid;
        grid-template-columns: 18px 62px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        min-height: 0;
        cursor: pointer;
        box-shadow: var(--shadow-soft);
        backdrop-filter: blur(10px);
        transition:
          transform 0.18s ease,
          border-color 0.18s ease,
          background 0.18s ease;
      }

      .roadmap-item:hover {
        transform: translateY(-1px);
        border-color: rgba(239, 179, 192, 0.28);
        background: rgba(255, 255, 255, 0.06);
      }

      .roadmap-item:active {
        transform: scale(0.995);
      }

      .roadmap-item.active {
        border-color: rgba(239, 179, 192, 0.34);
        background: rgba(216, 106, 134, 0.08);
      }

      .roadmap-dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(180deg, #ffd8e1, #efb3c0);
        box-shadow:
          0 0 0 4px rgba(21, 18, 22, 0.98),
          0 0 0 5px rgba(239, 179, 192, 0.08);
      }

      .roadmap-date {
        font-size: 12px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.02em;
        white-space: nowrap;
      }

      .roadmap-label {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .footer-note {
        margin: 0;
        color: var(--muted-2);
        font-size: 12px;
        text-align: center;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        background: rgba(9, 7, 10, 0.5);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
        z-index: 50;
      }

      .overlay.open {
        opacity: 1;
        pointer-events: auto;
      }

      .overlay-panel {
        width: min(100%, 760px);
        height: 100dvh;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)),
          #171217;
        border: 1px solid var(--border);
        border-bottom: 0;
        border-radius: 28px 28px 0 0;
        box-shadow: var(--shadow);
        transform: translateY(100%);
        transition: transform 0.34s cubic-bezier(0.22, 1, 0.36, 1);
        overflow: hidden;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .overlay.open .overlay-panel {
        transform: translateY(0);
      }

      .overlay-bar {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 14px 16px 12px;
        background: rgba(23, 18, 23, 0.9);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
      }

      .close-btn {
        border: 1px solid var(--border-strong);
        background: rgba(255,255,255,0.05);
        color: white;
        border-radius: 999px;
        padding: 9px 14px;
        cursor: pointer;
      }

      .close-btn:hover {
        background: rgba(255,255,255,0.08);
      }

      .overlay-hint {
        font-size: 12px;
        color: var(--muted-2);
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .overlay-scroll {
        min-height: 0;
        overflow: auto;
        padding: 14px 16px 26px;
      }

      .detail-cover {
        position: relative;
        overflow: hidden;
        min-height: 220px;
        margin-bottom: 18px;
        border-radius: 24px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-soft);
        background: var(--card);
      }

      .detail-cover-image {
        display: block;
        width: 100%;
        height: 220px;
        object-fit: cover;
      }

      .detail-cover::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(16, 12, 16, 0.02), rgba(16, 12, 16, 0.18));
        pointer-events: none;
      }

      .detail-hero {
        margin-bottom: 20px;
      }

      .detail-top-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .date-badge {
        background: white;
        color: var(--accent-dark);
        border-radius: 999px;
        padding: 6px 11px;
        font-size: 12px;
        font-weight: 700;
      }

      .mood {
        color: var(--muted-2);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }

      .detail-title {
        margin: 0 0 6px;
        font-size: 31px;
        line-height: 1.02;
        letter-spacing: -0.03em;
      }

      .detail-subtitle {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
      }

      .city {
        margin: 0;
        color: var(--muted-2);
        font-size: 14px;
      }

      .detail-content {
        display: grid;
        gap: 18px;
      }

      .detail-section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 16px;
        box-shadow: var(--shadow-soft);
      }

      .section-title {
        margin: 0 0 10px;
        font-size: 13px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      .quick-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .map-action {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--border-strong);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        text-decoration: none;
        border-radius: 16px;
        padding: 12px 14px;
        min-height: 50px;
        transition:
          transform 0.16s ease,
          background 0.16s ease,
          border-color 0.16s ease;
      }

      .map-action:hover {
        transform: translateY(-1px);
        background: rgba(255,255,255,0.07);
        border-color: rgba(239, 179, 192, 0.24);
      }

      .map-action-icon {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.08);
        font-size: 14px;
        flex: 0 0 auto;
      }

      .map-action-text {
        display: grid;
        gap: 2px;
      }

      .map-action-label {
        font-size: 13px;
        color: var(--muted);
      }

      .map-action-value {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .tags-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        border: 1px solid var(--border-strong);
        background: var(--card-2);
        border-radius: 999px;
        padding: 9px 12px;
        font-size: 14px;
        color: var(--text);
      }

      .transport-list {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
      }

      .transport-list li {
        margin-bottom: 8px;
        line-height: 1.45;
      }

      .options-list {
        display: grid;
        gap: 10px;
      }

      .sleep-box {
        background: var(--card-2);
        border: 1px solid var(--border-strong);
        border-radius: 18px;
        padding: 14px;
      }

      .sleep-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      .sleep-name {
        font-size: 15px;
        letter-spacing: -0.01em;
      }

      .price-pill {
        font-size: 12px;
        color: var(--accent);
        border: 1px solid rgba(239, 179, 192, 0.18);
        background: rgba(239, 179, 192, 0.05);
        border-radius: 999px;
        padding: 6px 10px;
      }

      .note {
        color: var(--muted);
        margin: 8px 0 0;
        line-height: 1.5;
      }

      .hotel-link {
        display: inline-block;
        margin-top: 12px;
        color: white;
        text-decoration: none;
        border: 1px solid var(--border-strong);
        background: rgba(255,255,255,0.04);
        border-radius: 999px;
        padding: 9px 12px;
        font-size: 13px;
      }

      .hotel-link:hover {
        background: rgba(255,255,255,0.07);
      }

      .day-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-top: 2px;
      }

      .day-nav-status {
        order: -1;
        flex: 1 0 100%;
        text-align: center;
        color: var(--muted-2);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      .day-nav-btn {
        flex: 1 1 0;
        min-height: 48px;
        border: 1px solid var(--border-strong);
        background: rgba(255,255,255,0.05);
        color: var(--text);
        border-radius: 16px;
        padding: 12px 14px;
        cursor: pointer;
        transition:
          transform 0.16s ease,
          background 0.16s ease,
          border-color 0.16s ease;
      }

      .day-nav-btn:hover {
        transform: translateY(-1px);
        background: rgba(255,255,255,0.07);
        border-color: rgba(239, 179, 192, 0.24);
      }

      .day-nav-btn:disabled {
        opacity: 0.42;
        cursor: default;
        transform: none;
      }

      @media (min-width: 761px) {
        .overlay {
          padding: 16px;
        }

        .overlay-panel {
          height: min(92dvh, 900px);
          border: 1px solid var(--border);
          border-radius: 30px;
        }
      }

      @media (max-width: 640px) {
        .page {
          padding: 12px 10px 12px;
        }

        .container {
          gap: 10px;
        }

        .hero {
          padding: 16px 16px 14px;
          border-radius: 22px;
        }

        .title {
          font-size: 28px;
        }

        .subtitle {
          font-size: 13px;
        }

        .top-summary {
          gap: 7px;
        }

        .pill {
          font-size: 11px;
          padding: 6px 10px;
        }

        .roadmap {
          gap: 6px;
        }

        .roadmap-item {
          grid-template-columns: 18px 56px minmax(0, 1fr);
          gap: 9px;
          padding: 9px 10px;
          border-radius: 16px;
        }

        .roadmap-label {
          font-size: 13px;
        }

        .footer-note {
          font-size: 11px;
        }

        .overlay-bar {
          padding-top: max(14px, env(safe-area-inset-top));
        }

        .overlay-scroll {
          padding-bottom: max(24px, env(safe-area-inset-bottom));
        }

        .detail-cover {
          min-height: 190px;
          border-radius: 22px;
        }

        .detail-cover-image {
          height: 190px;
        }

        .detail-title {
          font-size: 28px;
        }

        .quick-actions {
          flex-direction: column;
        }

        .map-action {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="container">
        <section class="hero">
          <h1 class="title">Gemma & Alex in Vietnam</h1>
          <p class="subtitle">
            11 days across Ho Chi Minh, Hoi An, Hue, Ninh Binh, Hanoi &amp; Ha Long
          </p>

          <div class="top-summary">
            <span class="pill">27/03 → 06/04</span>
          </div>
        </section>

        <div id="app" class="roadmap" aria-label="Trip roadmap"></div>

        <p class="footer-note">Tap any day to open the details</p>
      </div>
    </main>

    <div id="dayOverlay" class="overlay" aria-hidden="true">
      <div class="overlay-panel" role="dialog" aria-modal="true">
        <div class="overlay-bar">
          <button id="closeOverlay" class="close-btn" type="button">← Back</button>
          <span id="overlayHint" class="overlay-hint">Day details</span>
        </div>
        <div id="overlayContent" class="overlay-scroll"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
